<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0F1A"/>
      <stop offset="100%" style="stop-color:#1E2433"/>
    </linearGradient>
    <linearGradient id="track" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <!-- Roller coaster track -->
  <path d="M 15 65 Q 25 20 40 45 Q 50 60 55 35 Q 60 15 70 40 Q 80 60 85 50"
        stroke="url(#track)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Support pillars -->
  <line x1="25" y1="42" x2="25" y2="75" stroke="#64748B" stroke-width="2" opacity="0.4"/>
  <line x1="45" y1="48" x2="45" y2="75" stroke="#64748B" stroke-width="2" opacity="0.4"/>
  <line x1="62" y1="28" x2="62" y2="75" stroke="#64748B" stroke-width="2" opacity="0.4"/>
  <line x1="78" y1="50" x2="78" y2="75" stroke="#64748B" stroke-width="2" opacity="0.4"/>
  <!-- Cart -->
  <circle cx="33" cy="33" r="5" fill="#F59E0B"/>
  <circle cx="33" cy="33" r="2.5" fill="#FCD34D"/>
  <!-- Ground line -->
  <line x1="10" y1="75" x2="90" y2="75" stroke="#1E293B" stroke-width="2"/>
</svg>
