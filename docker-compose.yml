services:
  resortpass-api:
    build: .
    container_name: resortpass-api
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_PATH=/app/data/resortpass.db
      - API_PORT=3000
      - STATUS_JSON_PATH=/app/dist/api/status.json
    volumes:
      - ./data:/app/data
      - ./dist:/app/dist
    networks:
      - caddy-net

  resortpass-checker:
    build: .
    container_name: resortpass-checker
    restart: unless-stopped
    command: >
      /bin/sh -c "while true; do
        echo \"[$$(date -Iseconds)] Running checker...\";
        bun run server/checker.ts;
        echo \"[$$(date -Iseconds)] Sleeping 900s (15min)...\";
        sleep 900;
      done"
    env_file: .env
    environment:
      - DB_PATH=/app/data/resortpass.db
      - STATUS_JSON_PATH=/app/dist/api/status.json
    volumes:
      - ./data:/app/data
      - ./dist:/app/dist
    networks:
      - caddy-net

networks:
  caddy-net:
    external: true
